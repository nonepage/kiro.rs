services:
  kiro-rs:
    image: ghcr.io/${IMAGE_OWNER:-nonepage}/kiro-rs:${IMAGE_TAG:-beta}
    container_name: kiro-rs
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8990:8990"
    volumes:
      - ./config/:/app/config/
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kiro-rs-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
